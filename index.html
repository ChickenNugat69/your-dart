<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Darts</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <button id="settingsButton" aria-label="Einstellungen öffnen">⚙</button>

        <h1>Your Darts</h1>

        <button aria-label="Profil">👤</button>
    </header>

    <main>

    <!-- Profil / Rang -->
    <section class="card profileCard">

       <div id="rankPlaceholder" class="rankPlaceholder" hidden></div>

       <img id="rankImage" class="profileImage" src="images/rank_placeholder.png" alt="Rang" hidden>

        <h2 id="rankName" class="rankName" hidden></h2>

        <div id="averageStats" class="profileStats" hidden>
            <p class="profileStat">
                <span class="statLabel">Rang Avg:</span>
                <span id="average" class="statValue">0.00</span>
            </p>

            <p class="profileStat">
                <span class="statLabel">Runden Avg:</span>
                <span id="roundAverage" class="statValue">0.00</span>
            </p>

            <p class="profileStat">
                <span class="statLabel">Best Finish:</span>
                <span id="bestFinish" class="statValue">0</span>
            </p>

            <p class="profileStat">
                <span class="statLabel">Top Score:</span>
                <span id="topScore" class="statValue">0</span>
            </p>
        </div>

    </section>

    <!-- Punkte -->
    <section class="card game">

        <div class="box">

            <h3>Game</h3>

            <p id="gamePoints">501</p>

        </div>

        <div class="box">

            <h3>Remaining</h3>

            <p id="remaining">501</p>

        </div>

    </section>

    <!-- Würfe -->
    <section class="card throws">

        <div class="dartDisplays" aria-label="Aktuelle Aufnahme">
            <output id="dart1" class="dartDisplay" aria-label="Wurf 1">Wurf 1</output>
            <output id="dart2" class="dartDisplay" aria-label="Wurf 2">Wurf 2</output>
            <output id="dart3" class="dartDisplay" aria-label="Wurf 3">Wurf 3</output>
        </div>

        <div id="scoreKeyboard" class="scoreKeyboard" aria-label="Score Tastatur"></div>

    </section>

</main>
<div id="winScreen" class="winScreen">

    <div class="winBox">

        <h2>🏆 Gewonnen!</h2>

        <div class="stats">

            <div class="stat">
                <p>Average</p>
                <span id="winAverage"></span>
            </div>

            <div class="stat">
                <p>Darts</p>
                <span id="winDarts"></span>
            </div>

        </div>

        <button id="newGameButton">
            Neues Spiel
        </button>

    </div>

</div>

<div id="settingsScreen" class="settingsScreen" aria-hidden="true">

    <div class="settingsBox" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">

        <div class="settingsHeader">
            <h2 id="settingsTitle">Einstellungen</h2>
            <button id="closeSettingsButton" aria-label="Einstellungen schließen">×</button>
        </div>

        <div class="settingsOption">
            <div>
                <h3>Design</h3>
                <p>Wechsle zwischen Light Mode und Dark Mode.</p>
            </div>

            <button id="themeToggle" class="themeToggle" type="button" aria-pressed="false">
                <span class="toggleIcon">🌙</span>
                <span id="themeToggleText">Dark Mode</span>
            </button>
        </div>

        <div class="settingsOption">
            <div>
                <h3>Game</h3>
                <p>Wähle die Startpunkte für das nächste Spiel.</p>
            </div>

            <select id="gameSelect" aria-label="Startpunkte auswählen">
                <option value="101">101</option>
                <option value="201">201</option>
                <option value="301">301</option>
                <option value="401">401</option>
                <option value="501" selected>501</option>
                <option value="601">601</option>
                <option value="701">701</option>
                <option value="801">801</option>
                <option value="901">901</option>
            </select>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
