<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Your Darts App Icon</title>
  <desc id="desc">A black and gold dartboard emblem with three darts.</desc>
  <defs>
